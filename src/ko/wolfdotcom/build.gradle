ext {
    extName = 'Wolf.com'
    extClass = '.WolfFactory'
    extVersionCode = 4
    isNsfw = true
}

apply plugin: "kei.plugins.extension.legacy"

// NOTE: this used to auto-discover the current wfwf<N>.com mirror number at build time via a
// custom androidComponents/UpdateDomainNumberTask that scraped https://nicelink52.com/ and wrote
// a generated DomainNumber.kt. That lookup domain no longer returns the expected redirect (404
// as of 2026-07-13) and this custom Gradle-only codegen never ran under the raw-kotlinc audit
// harness anyway, leaving DEFAULT_DOMAIN_NUMBER permanently unresolved for it. The constant is
// now a plain literal in Wolf.kt (kept in sync manually / self-healed at runtime via
// domainNumberInterceptor + the domain_number preference).
